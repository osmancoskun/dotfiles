# Solid colour via swaybg: `-c` expects rrggbb with NO `#` (hash starts a comment in sway configs).
# Do not use `output * bg #hex solid` here — the `#` breaks parsing (“missing background scaling mode”).
#
# If you use scripts/setup/wallpaper-daily.sh (image swaybg), leave the line below commented:
# two swaybg clients fight, and this file loads after 91-wallpaper-daily.conf by default.
# Uncomment only when you are not using the daily wallpaper daemon.
# exec /usr/bin/swaybg -c 2e3440
